[General]

# Tool length measured from jaw tip to marker/chalk tip (meters).
# Measure the part of the marker that sticks out past the gripper jaws.
tool_length = 0.0

# Scale factor: metres per gcode unit.
# 0.001 = gcode units are millimetres (standard Inkscape output).
# 0.75  = original SDK default (gcode units are ~inches-ish).
scale = 0.001

# Allow the robot to walk while drawing.
# Set to false for a stationary test (safer to start with).
allow_walking = false

# Draw on the floor (false) or a vertical wall (true).
draw_on_wall = false

# Arm speed [m/s].
velocity = 0.15

# Height above ground to lift the arm for travel moves [meters].
travel_z = 0.05

# Gcode Z value below which force/admittance mode is enabled.
# All draw strokes in a standard floor gcode file have Z <= 0,
# so 0.0 means: Z < 0 → draw (force mode), Z >= 0 → travel (position mode).
below_z_is_admittance = 0.0

# How hard to press down (negative = press into surface).
# Start with a very small value and increase if the marker doesn't touch.
press_force_percent = -0.01

# Minimum distance between current arm position and goal before
# advancing to the next gcode line [meters].
min_dist_to_goal = 0.03

# Translate gcode X/Y origin (useful if your gcode doesn't start at 0,0).
gcode_start_x = 0
gcode_start_y = 0

# Walk to this position (in gcode frame) after finishing. Comment out to disable.
# walk_to_at_end_rt_gcode_origin_x = 0
# walk_to_at_end_rt_gcode_origin_y = 0

# Use the SLAM vision frame (true) or odometry frame (false).
# Vision frame is more accurate for larger drawings.
use_vision_frame = true

# Lift the arm when there is excess lateral force (helps on rough surfaces).
# Set to false for smooth paper on a flat floor.
use_xy_to_z_cross_term = false

# Bias force applied to counteract the robot leaning back while pressing down.
# -25 is the SDK default for chalk on pavement. Use 0 for marker on paper.
bias_force_x = 0
