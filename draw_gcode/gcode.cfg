[General]
tool_length = 0.08
scale = 0.001
allow_walking = false
draw_on_wall = false
velocity = 0.15
travel_z = 0.0485
below_z_is_admittance = 0.0
press_force_percent = -0.005
draw_z_offset = 0.004
min_dist_to_goal = 0.03
gcode_start_x = 0
gcode_start_y = 0
use_vision_frame = true
use_xy_to_z_cross_term = false
bias_force_x = 0

; ── Touch / canvas tuning ────────────────────────────────────────────────────
; touch_z_offset_mm  Fine-tune where the brush draws relative to the detected
;   canvas surface.  Negative → lower (press into canvas more, use when brush
;   floats slightly above).  Positive → higher (use when brush drags too hard).
;   Start with 0, adjust in 1–2 mm steps.
touch_z_offset_mm = 0

; canvas_margin  Fraction of the canvas used for drawing (default 0.80 = 80%).
;   Reducing this shrinks the drawing away from the canvas edges, compensating
;   for heading-alignment error and arm-reach limits at the corners.
;   0.90 = full auto-scale, 0.70 = conservative 70%.
canvas_margin = 0.80

; arm_draw_x_mm  Maximum total drawing extent in the forward direction (canvas
;   width axis, gcode X).  Arm safely reaches ≈380–750 mm from body; with canvas
;   centre at 600 mm the safe window is ±150 mm = 300 mm total.  Increase only
;   if you know the arm can reach further without hitting legs.
arm_draw_x_mm = 300

; arm_draw_y_mm  Maximum total drawing extent in the lateral direction (canvas
;   height axis, gcode Y).  Values beyond ≈±220 mm risk the arm swinging into
;   a front leg, especially at minimum forward reach.
arm_draw_y_mm = 440
