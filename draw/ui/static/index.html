<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spot Canvas Draw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #111;
      color: #ccc;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #000;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    #topbar h1 { font-size: .85rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #fff; }

    #mode-badge {
      padding: 2px 8px;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      border: 1px solid #555;
      color: #ccc;
    }
    .mode-idle       { border-color: #444; color: #666; }
    .mode-autonomous { border-color: #aaa; color: #fff; }
    .mode-teleop     { border-color: #fff; color: #fff; background: #fff; color: #000; }
    .mode-estop      { border-color: #fff; color: #fff; background: #000; animation: blink .5s step-end infinite; }

    @keyframes blink { 50% { background: #fff; color: #000; } }

    #connection-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #333; margin-left: auto; flex-shrink: 0;
    }
    #connection-dot.connected    { background: #aaa; }
    #connection-dot.disconnected { background: #555; }

    #main { display: flex; flex: 1; overflow: hidden; }

    #canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #111;
      position: relative;
    }

    #canvas-bg { position: relative; }

    #draw-canvas {
      display: block;
      background: #fff;
      cursor: crosshair;
      border: 1px solid #444;
    }

    #estop-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,.08);
      pointer-events: none;
      border: 3px solid #fff;
    }

    #canvas-hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: #000;
      border: 1px solid #444;
      color: #888;
      font-size: .75rem;
      padding: 3px 10px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .15s;
      white-space: nowrap;
    }
    #canvas-hint.visible { opacity: 1; }

    #sidebar {
      width: 200px;
      flex-shrink: 0;
      background: #000;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      padding: 12px 10px;
      gap: 14px;
      overflow-y: auto;
    }

    #sidebar h2 {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #555;
      margin-bottom: 5px;
      border-bottom: 1px solid #222;
      padding-bottom: 3px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 4px;
      background: #111;
      color: #bbb;
      border: 1px solid #333;
      font-family: inherit;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: left;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:hover:not(:disabled) { background: #222; color: #fff; border-color: #666; }
    .btn:active:not(:disabled) { background: #fff; color: #000; }
    .btn:disabled { opacity: .3; cursor: not-allowed; }

    .btn-estop { border-color: #888; color: #fff; font-size: .82rem; padding: 10px; }
    .btn-estop:hover:not(:disabled) { background: #fff; color: #000; border-color: #fff; }

    #info-box {
      font-size: .75rem;
      line-height: 1.9;
      color: #555;
    }
    #info-box span { color: #ccc; }

    #stroke-count { font-size: .7rem; color: #444; }

    #vicon-panel { display: flex; flex-direction: column; gap: 5px; }
    .vicon-row { display: flex; align-items: center; gap: 7px; font-size: .72rem; color: #555; }
    .vicon-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: #333; }
    .vicon-dot.ok  { background: #aaa; }
    .vicon-dot.bad { background: #555; }
  </style>
</head>
<body>

<!-- ============================================================ top bar -->
<div id="topbar">
  <h1>Spot Canvas Draw</h1>
  <div id="mode-badge" class="mode-idle">IDLE</div>
  <div style="margin-left:auto; display:flex; align-items:center; gap:6px; font-size:.7rem; color:#444;">
    WS
    <div id="connection-dot" class="disconnected"></div>
  </div>
</div>

<!-- ============================================================ main area -->
<div id="main">

  <!-- canvas panel -->
  <div id="canvas-wrap">
    <div id="canvas-bg">
      <canvas id="draw-canvas"></canvas>
      <div id="estop-overlay"></div>
    </div>
    <div id="canvas-hint">Click &ldquo;Takeover&rdquo; to draw</div>
  </div>

  <!-- sidebar -->
  <div id="sidebar">

    <!-- emergency stop — always big and red -->
    <div>
      <h2>Emergency</h2>
      <button class="btn btn-estop" id="btn-estop">E-STOP</button>
    </div>

    <!-- operator control -->
    <div>
      <h2>Control</h2>
      <button class="btn" id="btn-takeover">Takeover</button>
      <button class="btn" id="btn-release">Release</button>
      <button class="btn" id="btn-auto">Autonomous</button>
      <button class="btn" id="btn-reset">Reset E-Stop</button>
    </div>

    <!-- canvas actions -->
    <div>
      <h2>Canvas</h2>
      <button class="btn" id="btn-clear">Clear</button>
      <button class="btn" id="btn-save">Save PNG</button>
      <button class="btn" id="btn-ik">Hide IK overlay</button>
    </div>

    <!-- live info -->
    <div>
      <h2>Brush Position</h2>
      <div id="info-box">
        u: <span id="info-u">—</span><br/>
        v: <span id="info-v">—</span><br/>
        pen: <span id="info-pen">—</span>
      </div>
    </div>

    <!-- Vicon object status -->
    <div>
      <h2>Vicon Objects</h2>
      <div id="vicon-panel">
        <div class="vicon-row"><div class="vicon-dot" id="dot-spot-body"></div> Spot body</div>
        <div class="vicon-row"><div class="vicon-dot" id="dot-spot-ee"></div>   End-effector</div>
        <div class="vicon-row"><div class="vicon-dot" id="dot-brush-tip"></div> Brush tip</div>
        <div class="vicon-row"><div class="vicon-dot" id="dot-canvas"></div>    Canvas corners</div>
      </div>
    </div>

    <div id="stroke-count">strokes: <span id="stroke-num">0</span></div>
  </div>
</div><!-- #main -->

<script src="/static/app.js"></script>
</body>
</html>
